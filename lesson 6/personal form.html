<!DOCTYPE html>
<htmml>
      <head>
        <title> form creation in html</title>
      </head>
        <body>
            <h1> personal details form</h1>

              <form> 
                <label>name: </label><br>
                <input type="text" id="name"<br><br>
                <label>email: </label><br>
                <input type="email" id="email"<br><br>
                <label>birthday: </label><br>
                <input type="date" id="birthday"<br><br>
                <label> password: </label><br>
                <input type="password" id="password"<br><br>
                <label>gender:</label><br>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label><br>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label><br>
                
             <fieldset>
                  <LEGEND>MY SELECTION</LEGEND>
                  <LABEL>SELECT HOBBY:</LABEL>
                    <SELECT NAME="hobby" id="hobby">
                        <OPTION VALUE="cricket">CRICKET</OPTION>
                        <OPTION VALUE="BADMINTON">BADMINTON</OPTION>
                        <OPTION VALUE="FOOTBALL">FOOTBALL</OPTION>
                        <OPTION VALUE="singing">SINGING</OPTION>
                    </SELECT><br><br>
                        
                        <LABEL>FAVOURITE CITY:</LABEL><BR><br>
                        <INPUT TYPE="checkbox" NAME="city" VALUE="delhi">DELHI<BR><br>
                            <input type="checkbox" name="city"
                            value="mumbai">MUMBAI<BR><br>
                                    <input type="checkbox" name="city" value="kolkata">KOLKATA<BR><br>
                    
                </fieldset>

                <input type="submit">
                        
             </fieldset>
              </form>
        </body>
</htmml>
